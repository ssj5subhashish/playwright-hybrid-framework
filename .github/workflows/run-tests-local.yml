name: Playwright Tests (Local Runner)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        default: 'qa'
        type: choice
        options:
          - dev
          - qa
          - prod
      browser:
        description: 'Browser type'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - safari
      test_suite:
        description: 'Test Suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - web
          - mWeb

jobs:
  web-tests:
    name: Desktop Web Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'web' || github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: |
          npm ci

      - name: Install Playwright Browsers
        run: |
          npx playwright install --with-deps

      - name: Run Automation Tests (Web)
        run: |
          npm run test:web
        env:
          ENV: ${{ github.event.inputs.environment || 'qa' }}
          BROWSER: ${{ github.event.inputs.browser || 'chrome' }}
          HEADLESS: 'true'

      - name: Upload Mochawesome HTML Reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: web-mochawesome-reports
          path: reports/web
          retention-days: 7

  mweb-tests:
    name: Mobile Web Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'mWeb' || github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: |
          npm ci

      - name: Install Playwright Browsers
        run: |
          npx playwright install --with-deps

      - name: Run Automation Tests (mWeb)
        run: |
          npm run test:mWeb
        env:
          ENV: ${{ github.event.inputs.environment || 'qa' }}
          BROWSER: ${{ github.event.inputs.browser || 'chrome' }}
          HEADLESS: 'true'

      - name: Upload Mochawesome HTML Reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: mweb-mochawesome-reports
          path: reports/mWeb
          retention-days: 7
